[server]
grpc_port = 50051
max_request_size_mb = 4

[valhalla]
url = "http://localhost:8002"
timeout_seconds = 10
max_alternatives = 3

[ingestion]
download_base_url = "https://download.geofabrik.de/north-america/us"
tile_dir = "/data/tiles"
osm_data_dir = "/data/osm"
custom_paths_dir = "/data/custom_paths"
valhalla_config_path = "/config/valhalla.json"
[[ingestion.regions]]
id = "medilag-campus"
osm_region = "nigeria"
osm_pbf_url = "https://download.geofabrik.de/africa/nigeria-latest.osm.pbf"
custom_paths_file = "medilag_campus.geojson"
tile_dir = "/data/tiles/medilag-campus"
use_campus_costing = true

[tracing]
level = "info"
format = "json"
